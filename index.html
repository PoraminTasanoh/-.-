        // 1. ตัวแปลงข้อมูลดิบ (Data Parser)
        function initMasterData() {
            const lines = rawCSV.trim().split('\n').slice(1);
            let counts = { '2568': 1, '2567': 1, '2566': 1 };
            let lastC = { '2568': '', '2567': '', '2566': '' };

            lines.forEach(line => {
                if (!line.trim()) return;
                
                let row =[];
                let inQuote = false, currentStr = '';
                for (let i = 0; i < line.length; i++) {
                    if (line[i] === '"') inQuote = !inQuote;
                    else if (line[i] === ',' && !inQuote) { row.push(currentStr); currentStr = ''; }
                    else currentStr += line[i];
                }
                row.push(currentStr);

                let c = row[1] ? row[1].trim() : '';
                let n = row[2] ? row[2].trim() : '';
                let p = row[3] ? row[3].trim() : '';
                let t = row[4] ? row[4].trim() : '';
                let b = parseInt(row[5].replace(/,/g, '')) || 0;
                let yr = row[6] ? row[6].trim() : '';
                let statusStr = row[7] ? row[7].trim() : '';
                let date = row[8] ? row[8].trim() : '';

                if (c) lastC[yr] = c; else c = lastC[yr];

                let ok0 = (statusStr === 'ส่งแล้ว' || statusStr === 'TRUE');
                let shortYr = yr.substring(2);
                let idx = counts[yr]++;
                let id = `${shortYr}_${idx.toString().padStart(3, '0')}`;

                MASTER.push({
                    id: id, yr: yr, c: c, n: n, p: p, t: t, b: b, 
                    ok0: ok0, 
                    date: date || (ok0 ? '-' : '')
                });
            });
        }

        // 2. ดึงสถานะอัปเดตจาก Google Sheets ทับ
        function loadFromSheet() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=_sheetCallback`;
            document.body.appendChild(script);
        }

        function _sheetCallback(data) {
            data.forEach(row => {
                const project = MASTER.find(p => p.id == row.id);
                if (project) {
                    let sheetOk = (String(row.ok).toLowerCase() === 'true');
                    // ถ้าใน Sheet เป็น True ให้ยึดตาม Sheet (รับประกันข้อมูลใหม่)
                    // ถ้าใน Sheet เป็น False แต่ใน CSV บอกว่าส่งแล้ว ให้เก็บสถานะส่งแล้วไว้ (ป้องกันการรีเซ็ตข้อมูลตั้งต้น)
                    if (sheetOk) {
                        project.ok0 = true;
                        if (row.date) project.date = row.date;
                    }
                }
            });
            renderStats();
            renderTable();
        }

        // 3. ซิงค์สถานะใหม่กลับไปที่ Sheets เมื่อกดคลิก
        function syncToSheet(id, ok, date) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: id, ok: ok, date: date }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).then(r => r.json()).then(res => console.log('Synced:', res));
        }

        function toggleStatus(id) {
            requirePin(() => {
                const p = MASTER.find(x => x.id === id);
                if (p) {
                    p.ok0 = !p.ok0;
                    p.date = p.ok0 ? new Date().toLocaleDateString('th-TH') : '';
                    syncToSheet(p.id, p.ok0, p.date);
                    renderStats();
                    renderTable();
                }
            });
        }

        function renderStats() {
            const total = MASTER.length;
            const submitted = MASTER.filter(p => p.ok0).length;
            const percent = total > 0 ? Math.round((submitted / total) * 100) : 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';

            const getStat = (yr) => {
                const yrData = MASTER.filter(p => p.yr === yr);
                return { t: yrData.length, s: yrData.filter(p => p.ok0).length };
            };
            const s68 = getStat('2568');
            const s67 = getStat('2567');
            const s66 = getStat('2566');

            document.getElementById('statCards').innerHTML = `
                <div class="bg-blue-100 p-4 rounded shadow border-l-4 border-blue-500">
                    <p class="text-sm text-gray-600">รวมทั้งหมด</p>
                    <p class="text-xl font-bold">${submitted} / ${total}</p>
                </div>
                <div class="bg-green-100 p-4 rounded shadow border-l-4 border-green-500">
                    <p class="text-sm text-gray-600">ปี 2568</p>
                    <p class="text-xl font-bold">${s68.s} / ${s68.t}</p>
                </div>
                <div class="bg-yellow-100 p-4 rounded shadow border-l-4 border-yellow-500">
                    <p class="text-sm text-gray-600">ปี 2567</p>
                    <p class="text-xl font-bold">${s67.s} / ${s67.t}</p>
                </div>
                <div class="bg-gray-100 p-4 rounded shadow border-l-4 border-gray-500">
                    <p class="text-sm text-gray-600">ปี 2566</p>
                    <p class="text-xl font-bold">${s66.s} / ${s66.t}</p>
                </div>
            `;
        }

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const teacher = document.getElementById('teacherInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const status = document.getElementById('statusFilter').value;

            const filtered = MASTER.filter(p => {
                const matchSearch = p.n.toLowerCase().includes(search) || p.c.toLowerCase().includes(search);
                const matchTeacher = p.t.toLowerCase().includes(teacher);
                const matchYear = year === 'all' || p.yr === year;
                const matchStatus = status === 'all' || p.ok0.toString() === status;
                return matchSearch && matchTeacher && matchYear && matchStatus;
            });

            document.getElementById('tableBody').innerHTML = filtered.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 border-b align-top whitespace-nowrap">${p.c}</td>
                    <td class="p-3 border-b font-medium text-gray-800">${p.n} 
                        ${p.p ? `<br><span class="text-xs font-normal text-blue-600 bg-blue-50 px-2 py-0.5 rounded">ภายใต้: ${p.p}</span>` : ''}
                    </td>
                    <td class="p-3 border-b align-top text-gray-700">${p.t}</td>
                    <td class="p-3 border-b align-top">${p.b ? p.b.toLocaleString() : '-'} ฿</td>
                    <td class="p-3 border-b align-top text-center">${p.yr}</td>
                    <td class="p-3 border-b align-top text-center">
                        <input type="checkbox" class="w-5 h-5 cursor-pointer accent-green-600" ${p.ok0 ? 'checked' : ''} onchange="toggleStatus('${p.id}')">
                    </td>
                    <td class="p-3 border-b align-top text-xs text-gray-500">${p.date || '-'}</td>
                </tr>
            `).join('');
        }

        function requirePin(callback) {
            if (isUnlocked) { callback(); return; }
            const pin = prompt("กรุณากรอกรหัสผ่าน (PIN) เพื่อดำเนินการ:");
            if (pin === "1234") {
                isUnlocked = true;
                document.getElementById('lockBtn').innerText = '🔓 ปลดล็อกแล้ว';
                document.getElementById('lockBtn').classList.replace('bg-gray-600', 'bg-green-600');
                callback();
            } else if (pin !== null) {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function toggleLock() {
            isUnlocked = false;
            document.getElementById('lockBtn').innerText = '🔒 ล็อกอยู่';
            document.getElementById('lockBtn').classList.replace('bg-green-600', 'bg-gray-600');
            alert("ล็อกระบบเรียบร้อย");
        }

        function resetData() {
             if(confirm("ต้องการรีเซ็ตตัวกรองและการค้นหาทั้งหมดหรือไม่?")) {
                 document.getElementById('searchInput').value = '';
                 document.getElementById('teacherInput').value = '';
                 document.getElementById('yearFilter').value = 'all';
                 document.getElementById('statusFilter').value = 'all';
                 renderTable();
             }
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();
            ['2568', '2567', '2566'].forEach(yr => {
                const data = MASTER.filter(p => p.yr === yr).map(p => ({
                    'เลขที่โครงการ': p.c, 
                    'ชื่อโครงการ/กิจกรรม': p.n, 
                    'โครงการหลัก': p.p || '-',
                    'ผู้รับผิดชอบ': p.t, 
                    'งบประมาณ': p.b, 
                    'สถานะ': p.ok0 ? 'ส่งแล้ว' : 'ยังไม่ส่ง', 
                    'วันที่ส่ง': p.date || ''
                }));
                if (data.length > 0) {
                    const ws = XLSX.utils.json_to_sheet(data);
                    XLSX.utils.book_append_sheet(wb, ws, `ปี ${yr}`);
                }
            });
            XLSX.writeFile(wb, `รายงานโครงการ_โรงเรียนบ้านผึ้ง.xlsx`);
        }

        window.onload = () => {
            initMasterData(); // โหลดข้อมูลจาก CSV
            renderStats();
            renderTable();
            loadFromSheet();  // ดึงสถานะอัปเดตจาก Google Sheets
        };
    </script>
