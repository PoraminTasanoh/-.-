<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบติดตามรายงานโครงการ โรงเรียนบ้านผึ้ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .header-bg { background-color: #000080; } /* Navy Blue */
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="header-bg text-white p-4 shadow-md flex flex-wrap justify-between items-center">
        <h1 class="text-xl font-bold md:text-2xl">📊 Dashboard ติดตามรายงานโครงการ โรงเรียนบ้านผึ้ง</h1>
        <div class="flex gap-2 mt-2 md:mt-0">
            <button onclick="requirePin(exportExcel)" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded text-sm font-semibold flex items-center">
                📄 Export Excel
            </button>
            <button onclick="requirePin(resetData)" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-semibold flex items-center">
                🔄 รีเซ็ต
            </button>
            <button id="lockBtn" onclick="toggleLock()" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded text-sm font-semibold flex items-center">
                🔒 ล็อกอยู่
            </button>
        </div>
    </header>

    <main class="p-4 max-w-7xl mx-auto">
        <!-- Progress Bar -->
        <div class="mb-6 bg-white p-4 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-2">ภาพรวมการส่งรายงานทั้งหมด</h2>
            <div class="w-full bg-gray-200 rounded-full h-4">
                <div id="progressBar" class="bg-blue-600 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-sm text-gray-600 mt-1 text-right">0%</p>
        </div>

        <!-- Stat Cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="statCards">
            <!-- Render via JS -->
        </div>

        <!-- Filters -->
        <div class="bg-white p-4 rounded-lg shadow mb-6 flex flex-wrap gap-4">
            <input type="text" id="searchInput" placeholder="ค้นหาชื่อโครงการ..." class="border p-2 rounded flex-1 min-w-[200px]" oninput="renderTable()">
            <input type="text" id="teacherInput" placeholder="ค้นหาชื่อครู..." class="border p-2 rounded flex-1 min-w-[200px]" oninput="renderTable()">
            <select id="yearFilter" class="border p-2 rounded" onchange="renderTable()">
                <option value="all">ทุกปีการศึกษา</option>
                <option value="2568">2568</option>
                <option value="2567">2567</option>
                <option value="2566">2566</option>
            </select>
            <select id="statusFilter" class="border p-2 rounded" onchange="renderTable()">
                <option value="all">ทุกสถานะ</option>
                <option value="true">ส่งแล้ว</option>
                <option value="false">ยังไม่ส่ง</option>
            </select>
        </div>

        <!-- Table -->
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="min-w-full text-left border-collapse">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="p-3">เลขที่</th>
                        <th class="p-3">ชื่อโครงการ</th>
                        <th class="p-3">ผู้รับผิดชอบ</th>
                        <th class="p-3">งบประมาณ</th>
                        <th class="p-3">ปี</th>
                        <th class="p-3 text-center">สถานะการส่ง</th>
                        <th class="p-3">วันที่ส่ง</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y">
                    <!-- Render via JS -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwoWn3u7CVWoqiE9UvC-l3OIjHIFmJ4IQfWMMss_5zdERxZ0NFIr_v1m5MzAoduWp5U/exec';
        let MASTER =[]; // ใส่ข้อมูลโครงการเริ่มต้นที่นี่
        let isUnlocked = false;

        // โหลดข้อมูลเริ่มต้น
        function loadFromSheet() {
            const script = document.createElement('script');
            script.src = `${API_URL}?callback=_sheetCallback`;
            document.body.appendChild(script);
        }

        function _sheetCallback(data) {
            // ผสานข้อมูลจาก Sheets เข้ากับ MASTER array (อัปเดต ok และ date)
            data.forEach(row => {
                const project = MASTER.find(p => p.id == row.id);
                if (project) {
                    project.ok0 = row.ok === 'true' || row.ok === true;
                    project.date = row.date || '';
                }
            });
            renderStats();
            renderTable();
        }

        // อัปเดตข้อมูลไปยัง Sheets
        function syncToSheet(id, ok, date) {
            fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ id: id, ok: ok, date: date }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            }).then(r => r.json()).then(res => console.log('Synced:', res));
        }

        function toggleStatus(id) {
            requirePin(() => {
                const p = MASTER.find(x => x.id === id);
                if (p) {
                    p.ok0 = !p.ok0;
                    p.date = p.ok0 ? new Date().toLocaleDateString('th-TH') : '';
                    syncToSheet(p.id, p.ok0, p.date);
                    renderStats();
                    renderTable();
                }
            });
        }

        function renderStats() {
            const total = MASTER.length;
            const submitted = MASTER.filter(p => p.ok0).length;
            const percent = total > 0 ? Math.round((submitted / total) * 100) : 0;
            
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressText').innerText = percent + '%';

            // แยกตามปี
            const getStat = (yr) => {
                const yrData = MASTER.filter(p => p.yr === yr);
                return { t: yrData.length, s: yrData.filter(p => p.ok0).length };
            };
            const s68 = getStat('2568');
            const s67 = getStat('2567');
            const s66 = getStat('2566');

            document.getElementById('statCards').innerHTML = `
                <div class="bg-blue-100 p-4 rounded shadow border-l-4 border-blue-500">
                    <p class="text-sm text-gray-600">รวมทั้งหมด</p>
                    <p class="text-xl font-bold">${submitted} / ${total}</p>
                </div>
                <div class="bg-green-100 p-4 rounded shadow border-l-4 border-green-500">
                    <p class="text-sm text-gray-600">ปี 2568</p>
                    <p class="text-xl font-bold">${s68.s} / ${s68.t}</p>
                </div>
                <div class="bg-yellow-100 p-4 rounded shadow border-l-4 border-yellow-500">
                    <p class="text-sm text-gray-600">ปี 2567</p>
                    <p class="text-xl font-bold">${s67.s} / ${s67.t}</p>
                </div>
                <div class="bg-gray-100 p-4 rounded shadow border-l-4 border-gray-500">
                    <p class="text-sm text-gray-600">ปี 2566</p>
                    <p class="text-xl font-bold">${s66.s} / ${s66.t}</p>
                </div>
            `;
        }

        function renderTable() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const teacher = document.getElementById('teacherInput').value.toLowerCase();
            const year = document.getElementById('yearFilter').value;
            const status = document.getElementById('statusFilter').value;

            const filtered = MASTER.filter(p => {
                const matchSearch = p.n.toLowerCase().includes(search) || p.c.toLowerCase().includes(search);
                const matchTeacher = p.t.toLowerCase().includes(teacher);
                const matchYear = year === 'all' || p.yr === year;
                const matchStatus = status === 'all' || p.ok0.toString() === status;
                return matchSearch && matchTeacher && matchYear && matchStatus;
            });

            document.getElementById('tableBody').innerHTML = filtered.map(p => `
                <tr class="hover:bg-gray-50">
                    <td class="p-3 border-b">${p.c}</td>
                    <td class="p-3 border-b font-medium">${p.n} ${p.p ? `<br><span class="text-xs text-gray-500">(${p.p})</span>` : ''}</td>
                    <td class="p-3 border-b">${p.t}</td>
                    <td class="p-3 border-b">${p.b ? p.b.toLocaleString() : '-'} ฿</td>
                    <td class="p-3 border-b">${p.yr}</td>
                    <td class="p-3 border-b text-center">
                        <input type="checkbox" class="w-5 h-5 cursor-pointer" ${p.ok0 ? 'checked' : ''} onchange="toggleStatus('${p.id}')">
                    </td>
                    <td class="p-3 border-b text-sm text-gray-500">${p.date || '-'}</td>
                </tr>
            `).join('');
        }

        function requirePin(callback) {
            if (isUnlocked) {
                callback();
                return;
            }
            const pin = prompt("กรุณากรอกรหัสผ่าน (PIN) เพื่อดำเนินการ:");
            if (pin === "1234") {
                isUnlocked = true;
                document.getElementById('lockBtn').innerText = '🔓 ปลดล็อกแล้ว';
                document.getElementById('lockBtn').classList.replace('bg-gray-600', 'bg-green-600');
                callback();
            } else if (pin !== null) {
                alert("รหัสผ่านไม่ถูกต้อง!");
            }
        }

        function toggleLock() {
            isUnlocked = false;
            document.getElementById('lockBtn').innerText = '🔒 ล็อกอยู่';
            document.getElementById('lockBtn').classList.replace('bg-green-600', 'bg-gray-600');
            alert("ล็อกระบบแล้ว");
        }

        function resetData() {
             if(confirm("ต้องการรีเซ็ตตัวกรองและการค้นหาทั้งหมดหรือไม่?")) {
                 document.getElementById('searchInput').value = '';
                 document.getElementById('teacherInput').value = '';
                 document.getElementById('yearFilter').value = 'all';
                 document.getElementById('statusFilter').value = 'all';
                 renderTable();
             }
        }

        function exportExcel() {
            const wb = XLSX.utils.book_new();['2568', '2567', '2566'].forEach(yr => {
                const data = MASTER.filter(p => p.yr === yr).map(p => ({
                    'เลขที่': p.c, 'ชื่อโครงการ': p.n, 'ผู้รับผิดชอบ': p.t, 
                    'งบประมาณ': p.b, 'สถานะ': p.ok0 ? 'ส่งแล้ว' : 'ยังไม่ส่ง', 'วันที่ส่ง': p.date || ''
                }));
                const ws = XLSX.utils.json_to_sheet(data);
                XLSX.utils.book_append_sheet(wb, ws, `ปี ${yr}`);
            });
            XLSX.writeFile(wb, `รายงานโครงการ_โรงเรียนบ้านผึ้ง.xlsx`);
        }

        // จำลองข้อมูลเพื่อทดสอบ (ก่อนดึงจาก Google Sheets)
        MASTER =[
            {id:'68_001', yr:'2568', c:'1/68', n:'โครงการพัฒนาสื่อการเรียนรู้', p:'', t:'ครูสมใจ รักดี', b:15000, ok0:false},
            {id:'67_010', yr:'2567', c:'10/67', n:'กิจกรรมกีฬาสี', p:'โครงการส่งเสริมสุขภาพ', t:'ครูสมศักดิ์ แข็งแรง', b:20000, ok0:true, date:'15/10/2567'}
        ];

        window.onload = () => {
            renderStats();
            renderTable();
            loadFromSheet();
        };
    </script>
</body>
</html>
